name: Build iOS App

on:
  push:
    branches: [main, master, codex/**]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator:
    name: Simulator (.app)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          echo "=== xcode-select ==="; xcode-select -p
          echo "=== xcodebuild -version ==="; xcodebuild -version
          echo "=== swift --version ==="; swift --version
          echo "=== Available SDKs ==="; xcodebuild -showsdks | head -40

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List schemes & targets
        run: |
          echo "=== schemes ==="
          xcodebuild -list -project iospro.xcodeproj
          echo ""
          echo "=== pwd ==="
          pwd
          echo "=== ls iospro.xcodeproj ==="
          ls iospro.xcodeproj/

      - name: Build (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project iospro.xcodeproj \
            -scheme iospro \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build > build-sim.log 2>&1
          ec=$?
          echo "=== xcodebuild exit=$ec ==="
          echo "=== last 100 lines of build-sim.log ==="
          tail -100 build-sim.log
          echo "=== first 50 lines (for context) ==="
          head -50 build-sim.log
          exit $ec

      - name: Verify .app exists
        run: |
          APP="build/Build/Products/Debug-iphonesimulator/iospro.app"
          if [ ! -d "$APP" ]; then echo "App bundle not found at $APP"; exit 1; fi
          ls -la "$APP"

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: iospro-simulator
          path: build/Build/Products/Debug-iphonesimulator/iospro.app
          retention-days: 14
          if-no-files-found: error

  build-device-unsigned:
    name: Device (unsigned, for AltStore)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (iOS Device, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project iospro.xcodeproj \
            -scheme iospro \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            build > build-dev.log 2>&1
          ec=$?
          echo "=== xcodebuild exit=$ec ==="
          echo "=== last 100 lines of build-dev.log ==="
          tail -100 build-dev.log
          exit $ec

      - name: Package as .ipa
        run: |
          APP="build/Build/Products/Release-iphoneos/iospro.app"
          if [ ! -d "$APP" ]; then echo "App bundle not found at $APP"; exit 1; fi
          mkdir -p dist/Payload
          cp -R "$APP" dist/Payload/iospro.app
          cd dist && zip -r ../iospro-device-unsigned.ipa Payload && cd ..
          ls -la iospro-device-unsigned.ipa

      - name: Upload device artifact
        uses: actions/upload-artifact@v4
        with:
          name: iospro-device-unsigned
          path: iospro-device-unsigned.ipa
          retention-days: 14
          if-no-files-found: error