name: Build iOS App

on:
  push:
    branches: [main, master, codex/**]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator:
    name: Simulator (.app)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          ls /Applications/ | grep -i xcode || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project iospro.xcodeproj \
            -scheme iospro \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build > build-sim.log 2>&1 || { echo "=== BUILD FAILED ==="; tail -150 build-sim.log; exit 1; }

      - name: Verify .app exists
        run: |
          APP="build/Build/Products/Debug-iphonesimulator/iospro.app"
          if [ ! -d "$APP" ]; then echo "App bundle not found at $APP"; ls -R build/Build/ 2>/dev/null || true; exit 1; fi
          echo "Bundle: $APP"
          ls -la "$APP"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$APP/Info.plist"

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: iospro-simulator
          path: build/Build/Products/Debug-iphonesimulator/iospro.app
          retention-days: 14
          if-no-files-found: error

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iospro-simulator-build-log
          path: build-sim.log
          retention-days: 7
          if-no-files-found: ignore

  build-device-unsigned:
    name: Device (unsigned, for AltStore)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (iOS Device, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project iospro.xcodeproj \
            -scheme iospro \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            build > build-dev.log 2>&1 || { echo "=== BUILD FAILED ==="; tail -150 build-dev.log; exit 1; }

      - name: Package as .ipa
        run: |
          APP="build/Build/Products/Release-iphoneos/iospro.app"
          if [ ! -d "$APP" ]; then echo "App bundle not found at $APP"; ls -R build/Build/ 2>/dev/null || true; exit 1; fi
          mkdir -p dist/Payload
          cp -R "$APP" dist/Payload/iospro.app
          cd dist
          zip -r ../iospro-device-unsigned.ipa Payload
          cd ..
          ls -la iospro-device-unsigned.ipa

      - name: Upload device artifact
        uses: actions/upload-artifact@v4
        with:
          name: iospro-device-unsigned
          path: iospro-device-unsigned.ipa
          retention-days: 14
          if-no-files-found: error

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iospro-device-build-log
          path: build-dev.log
          retention-days: 7
          if-no-files-found: ignore