name: Build iOS App

on:
  push:
    branches: [main, master, codex/**]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator:
    name: Simulator (.app)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          echo "=== Xcode versions available ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || ls /Applications/ | grep -i xcode
          echo "=== Default Xcode ==="
          xcode-select -p
          xcodebuild -version
          echo "=== swift ==="
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project iospro.xcodeproj \
            -scheme iospro \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build > build-sim.log 2>&1
          echo "=== exit=$? ==="
          echo "=== last 80 lines of build-sim.log ==="
          tail -80 build-sim.log

      - name: Verify .app exists
        run: |
          APP="build/Build/Products/Debug-iphonesimulator/iospro.app"
          if [ ! -d "$APP" ]; then echo "App bundle not found at $APP"; ls -R build/Build/ 2>/dev/null || true; exit 1; fi
          echo "Bundle: $APP"
          ls -la "$APP"

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: iospro-simulator
          path: build/Build/Products/Debug-iphonesimulator/iospro.app
          retention-days: 14
          if-no-files-found: error

  build-device-unsigned:
    name: Device (unsigned, for AltStore)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (iOS Device, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project iospro.xcodeproj \
            -scheme iospro \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            build > build-dev.log 2>&1
          echo "=== exit=$? ==="
          echo "=== last 80 lines of build-dev.log ==="
          tail -80 build-dev.log

      - name: Package as .ipa
        run: |
          APP="build/Build/Products/Release-iphoneos/iospro.app"
          if [ ! -d "$APP" ]; then echo "App bundle not found at $APP"; ls -R build/Build/ 2>/dev/null || true; exit 1; fi
          mkdir -p dist/Payload
          cp -R "$APP" dist/Payload/iospro.app
          cd dist
          zip -r ../iospro-device-unsigned.ipa Payload
          cd ..
          ls -la iospro-device-unsigned.ipa

      - name: Upload device artifact
        uses: actions/upload-artifact@v4
        with:
          name: iospro-device-unsigned
          path: iospro-device-unsigned.ipa
          retention-days: 14
          if-no-files-found: error