name: Build iOS App

on:
  push:
    branches: [main, master, codex/**]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-simulator:
    name: Simulator (.app)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup debug log dir
        run: mkdir -p ci-logs

      - name: Show toolchain
        run: |
          {
            echo "=== xcode-select ==="
            xcode-select -p
            echo "=== xcodebuild -version ==="
            xcodebuild -version
            echo "=== swift --version ==="
            swift --version 2>&1 | head -3
          } > ci-logs/sim-1-toolchain.log 2>&1
          cat ci-logs/sim-1-toolchain.log

      - name: Install XcodeGen
        run: |
          {
            echo "=== installing xcodegen (downgrade to 2.42.0 if needed) ==="
            HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen 2>&1 || echo "brew install failed"
            XG_VERSION=$(xcodegen --version 2>&1 || echo "none")
            echo "Installed XcodeGen version: $XG_VERSION"
            # XcodeGen 2.43+ generates objectVersion=77 (Xcode 16) which 15.4 can't read
            if [[ "$XG_VERSION" == 2.4[3-9]* || "$XG_VERSION" == 2.5* || "$XG_VERSION" == 3.* ]]; then
              echo "Downgrading to XcodeGen 2.42.0..."
              XG_TMP=$(mktemp -d)
              cd "$XG_TMP"
              curl -sSL -o xcodegen.zip https://github.com/yonaskolb/XcodeGen/releases/download/2.42.0/xcodegen.zip
              unzip -q xcodegen.zip
              XG_FILE=$(find . -name "xcodegen" -type f -perm +111 | head -1)
              if [ -n "$XG_FILE" ]; then
                sudo cp "$XG_FILE" /usr/local/bin/xcodegen
                sudo chmod +x /usr/local/bin/xcodegen
                cd -
                rm -rf "$XG_TMP"
                xcodegen --version
              else
                cd -
                echo "FAILED to find xcodegen binary in zip"
                ls -la "$XG_TMP"
              fi
            fi
            echo "=== generating ==="
            xcodegen generate
            # Force objectVersion=70 (Xcode 15 format) - XcodeGen 2.45+ defaults to 77 (Xcode 16)
            echo "=== before sed, objectVersion ==="
            grep "objectVersion" iospro.xcodeproj/project.pbxproj || echo "no objectVersion found"
            sed -i.bak 's/objectVersion = [0-9]*/objectVersion = 46/' iospro.xcodeproj/project.pbxproj
            echo "=== after sed, objectVersion ==="
            grep "objectVersion" iospro.xcodeproj/project.pbxproj
            echo "=== pbxproj first 30 lines ==="
            head -30 iospro.xcodeproj/project.pbxproj
            echo "=== saving pbxproj ==="
            cp iospro.xcodeproj/project.pbxproj ci-logs/sim-pbxproj.pbxproj
          } > ci-logs/sim-2-xcodegen.log 2>&1
          ec=$?
          cat ci-logs/sim-2-xcodegen.log
          exit $ec

      - name: List schemes
        run: xcodebuild -list -project iospro.xcodeproj > ci-logs/sim-3-list.log 2>&1; cat ci-logs/sim-3-list.log; exit 0

      - name: Build (iOS Simulator)
        run: xcodebuild -project iospro.xcodeproj -scheme iospro -configuration Debug -destination 'generic/platform=iOS Simulator' -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build > ci-logs/sim-4-build.log 2>&1
        continue-on-error: true

      - name: Report build status
        if: always()
        run: |
          {
            echo "=== xcodebuild exit=$? ==="
            if [ -f ci-logs/sim-4-build.log ]; then
              wc -c ci-logs/sim-4-build.log
              echo "=== last 80 lines ==="
              tail -80 ci-logs/sim-4-build.log
            else
              echo "NO BUILD LOG FILE"
            fi
          } > ci-logs/sim-5-report.log 2>&1
          cat ci-logs/sim-5-report.log

      - name: Verify .app
        if: always()
        run: |
          APP="build/Build/Products/Debug-iphonesimulator/iospro.app"
          {
            if [ ! -d "$APP" ]; then echo "App bundle not found"; ls -la build/Build/Products/ 2>&1; exit 0; fi
            ls -la "$APP"
          } > ci-logs/sim-6-verify.log 2>&1
          cat ci-logs/sim-6-verify.log

      - name: Upload simulator artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iospro-simulator
          path: build/Build/Products/Debug-iphonesimulator/iospro.app
          retention-days: 14
          if-no-files-found: ignore

      - name: Push logs to debug branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B ci-debug
          git add -f ci-logs/
          git status --short
          git commit -m "ci-debug: sim logs run ${GITHUB_RUN_NUMBER}" || true
          git push origin ci-debug --force 2>&1
          echo "=== Sim Done ==="

  build-device-unsigned:
    name: Device (unsigned, for AltStore)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup debug log dir
        run: mkdir -p ci-logs
      - name: Install XcodeGen
        run: |
          {
            HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen 2>&1 || echo "brew install failed"
            XG_VERSION=$(xcodegen --version 2>&1 || echo "none")
            echo "Installed XcodeGen version: $XG_VERSION"
            if [[ "$XG_VERSION" == 2.4[3-9]* || "$XG_VERSION" == 2.5* || "$XG_VERSION" == 3.* ]]; then
              echo "Downgrading to XcodeGen 2.42.0..."
              XG_TMP=$(mktemp -d)
              cd "$XG_TMP"
              curl -sSL -o xcodegen.zip https://github.com/yonaskolb/XcodeGen/releases/download/2.42.0/xcodegen.zip
              unzip -q xcodegen.zip
              XG_FILE=$(find . -name "xcodegen" -type f -perm +111 | head -1)
              if [ -n "$XG_FILE" ]; then
                sudo cp "$XG_FILE" /usr/local/bin/xcodegen
                sudo chmod +x /usr/local/bin/xcodegen
                cd -
                rm -rf "$XG_TMP"
              else
                cd -
                echo "FAILED to find xcodegen binary"
              fi
              xcodegen --version
            fi
          } > ci-logs/dev-1-xcodegen.log 2>&1
      - name: Generate Xcode project
        run: |
          {
            xcodegen generate
            echo "=== before sed, objectVersion ===" >> ci-logs/dev-2-generate.log
            grep "objectVersion" iospro.xcodeproj/project.pbxproj >> ci-logs/dev-2-generate.log
            sed -i.bak 's/objectVersion = [0-9]*/objectVersion = 46/' iospro.xcodeproj/project.pbxproj
            echo "=== after sed, objectVersion ===" >> ci-logs/dev-2-generate.log
            grep "objectVersion" iospro.xcodeproj/project.pbxproj >> ci-logs/dev-2-generate.log
            cp iospro.xcodeproj/project.pbxproj ci-logs/dev-pbxproj.pbxproj
          } > ci-logs/dev-2-generate.log 2>&1
      - name: Build (iOS Device, unsigned)
        run: xcodebuild -project iospro.xcodeproj -scheme iospro -configuration Release -destination 'generic/platform=iOS' -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER="" DEVELOPMENT_TEAM="" build > ci-logs/dev-3-build.log 2>&1
        continue-on-error: true
      - name: Report build status
        if: always()
        run: |
          {
            echo "=== xcodebuild exit=$? ==="
            if [ -f ci-logs/dev-3-build.log ]; then
              wc -c ci-logs/dev-3-build.log
              tail -80 ci-logs/dev-3-build.log
            else
              echo "NO BUILD LOG FILE"
            fi
          } > ci-logs/dev-4-report.log 2>&1
          cat ci-logs/dev-4-report.log
      - name: Package as .ipa
        if: always()
        run: |
          APP="build/Build/Products/Release-iphoneos/iospro.app"
          if [ ! -d "$APP" ]; then echo "App bundle not found"; exit 0; fi
          mkdir -p dist/Payload
          cp -R "$APP" dist/Payload/iospro.app
          cd dist && zip -r ../iospro-device-unsigned.ipa Payload && cd .. >> ci-logs/dev-5-ipa.log 2>&1
      - name: Upload device artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iospro-device-unsigned
          path: iospro-device-unsigned.ipa
          retention-days: 14
          if-no-files-found: ignore
      - name: Push logs to debug branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin ci-debug --depth=1 2>/dev/null || true
          git checkout -B ci-debug
          git checkout origin/ci-debug -- ci-logs/ 2>/dev/null || true
          git add -f ci-logs/
          git status --short
          git commit -m "ci-debug: dev logs run ${GITHUB_RUN_NUMBER}" || true
          git push origin ci-debug --force 2>&1
          echo "=== Dev Done ==="