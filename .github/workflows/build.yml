name: Build iOS App

on:
  push:
    branches: [main, master, codex/**]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 写权限：默认 GITHUB_TOKEN 不一定有
permissions:
  contents: write

jobs:
  build-simulator:
    name: Simulator (.app)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          echo "=== xcode-select ==="; xcode-select -p
          echo "=== xcodebuild -version ==="; xcodebuild -version
          echo "=== Available SDKs ==="; xcodebuild -showsdks | head -40

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List schemes & targets
        run: |
          echo "=== schemes ==="
          xcodebuild -list -project iospro.xcodeproj

      - name: Build (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project iospro.xcodeproj \
            -scheme iospro \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build > build-sim.log 2>&1
          ec=$?
          echo "=== xcodebuild exit=$ec ==="
          echo "=== last 150 lines of build-sim.log ==="
          tail -150 build-sim.log
          exit $ec

      - name: Verify .app exists
        run: |
          APP="build/Build/Products/Debug-iphonesimulator/iospro.app"
          if [ ! -d "$APP" ]; then echo "App bundle not found at $APP"; exit 1; fi
          ls -la "$APP"

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: iospro-simulator
          path: build/Build/Products/Debug-iphonesimulator/iospro.app
          retention-days: 14
          if-no-files-found: error

      - name: Push build log to debug branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B ci-debug
          mkdir -p ci-logs
          cp build-sim.log "ci-logs/build-sim-${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}.log" 2>/dev/null || echo "no build-sim.log" > "ci-logs/build-sim-${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}.log"
          git add ci-logs/
          git commit -m "ci-debug: build-sim log from run ${GITHUB_RUN_NUMBER}" || true
          git push origin ci-debug --force 2>&1
          echo "=== Pushed to ci-debug branch ==="

  build-device-unsigned:
    name: Device (unsigned, for AltStore)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (iOS Device, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project iospro.xcodeproj \
            -scheme iospro \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            build > build-dev.log 2>&1
          ec=$?
          echo "=== xcodebuild exit=$ec ==="
          echo "=== last 150 lines of build-dev.log ==="
          tail -150 build-dev.log
          exit $ec

      - name: Package as .ipa
        run: |
          APP="build/Build/Products/Release-iphoneos/iospro.app"
          if [ ! -d "$APP" ]; then echo "App bundle not found at $APP"; exit 1; fi
          mkdir -p dist/Payload
          cp -R "$APP" dist/Payload/iospro.app
          cd dist && zip -r ../iospro-device-unsigned.ipa Payload && cd ..
          ls -la iospro-device-unsigned.ipa

      - name: Upload device artifact
        uses: actions/upload-artifact@v4
        with:
          name: iospro-device-unsigned
          path: iospro-device-unsigned.ipa
          retention-days: 14
          if-no-files-found: error

      - name: Push build log to debug branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B ci-debug
          mkdir -p ci-logs
          cp build-dev.log "ci-logs/build-dev-${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}.log" 2>/dev/null || echo "no build-dev.log" > "ci-logs/build-dev-${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}.log"
          git add ci-logs/
          git commit -m "ci-debug: build-dev log from run ${GITHUB_RUN_NUMBER}" || true
          git push origin ci-debug --force 2>&1
          echo "=== Pushed to ci-debug branch ==="